<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle v3.1.1 | Final Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="gradient-bg min-h-screen font-sans text-slate-900">

    <div id="app" class="max-w-2xl mx-auto p-4 md:p-8">
        <div class="flex items-center justify-center min-h-[60vh]">
            <p class="text-slate-400 animate-pulse">Initializing Circle Test Suite...</p>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://shudgqztadlbhiifzlby.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNodWRncXp0YWRsYmhpaWZ6bGJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Mjg5ODgsImV4cCI6MjA5MDEwNDk4OH0.JytW6-XJ0p2mFcKAZKI0TKPL5TrbuYSYkhDz1DwlZzs';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const TEST_SESSIONS = [
            { id: "1.1", section: "Core Flow", title: "Sign In", steps: ["Open the app", "Sign in with existing account"], expected: "Land on Home screen without errors" },
            { id: "1.2", section: "Core Flow", title: "Mood Check-in", steps: ["Tap mood check-in", "Select mood + note", "Save"], expected: "Celebration plays, aura updates" },
            { id: "1.5", section: "Core Flow", title: "Crisis (Offline)", steps: ["Turn off Wi-Fi/Data", "Navigate to Help"], expected: "NZ Crisis numbers show offline" },
            { id: "2.3", section: "New Features", title: "Low-Mood Response", steps: ["Log mood ≤ 3"], expected: "Supportive overlay + Breathing Exercise appears" },
            { id: "3.1", section: "Premium", title: "Upgrade Flow", steps: ["Settings -> Upgrade to Premium"], expected: "Pricing and sandbox options appear" }
        ];

        let currentIndex = 0;
        let testerInfo = { name: '', device: '', platform: 'iOS' };
        let isFailing = false;
        let uploadedImageUrl = null;

        const app = document.getElementById('app');

        // --- VIEWS ---
        function renderSetup() {
            app.innerHTML = `
                <div class="glass-card mt-20 p-8 rounded-[2.5rem] shadow-2xl border border-white">
                    <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-transparent mb-2">Circle v3.1.1</h1>
                    <p class="text-slate-500 mb-8 font-medium">Final Test Environment</p>
                    <div class="space-y-4">
                        <input id="tName" placeholder="Tester Name" class="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-purple-500 transition">
                        <div class="flex gap-4">
                            <input id="tDevice" placeholder="Device (e.g. S22)" class="flex-1 p-4 rounded-2xl border border-slate-200 outline-none">
                            <select id="tPlatform" class="p-4 rounded-2xl border border-slate-200 bg-white">
                                <option>iOS</option><option>Android</option>
                            </select>
                        </div>
                        <button onclick="startTesting()" class="w-full py-4 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-2xl font-bold shadow-lg transform active:scale-95 transition">Start Testing</button>
                    </div>
                </div>`;
        }

        function renderTest() {
            const test = TEST_SESSIONS[currentIndex];
            app.innerHTML = `
                <div class="flex justify-between mb-6">
                    <span class="px-4 py-1 bg-white rounded-full text-xs font-bold text-slate-400 shadow-sm">${test.section}</span>
                    <span class="text-xs text-slate-400 font-bold">${currentIndex + 1} / ${TEST_SESSIONS.length}</span>
                </div>
                <div class="glass-card rounded-[2.5rem] shadow-xl border border-white overflow-hidden">
                    <div class="p-8">
                        <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                            <span class="w-10 h-10 bg-purple-100 text-purple-600 rounded-xl flex items-center justify-center text-sm">${test.id}</span>
                            ${test.title}
                        </h2>
                        <ul class="space-y-3 mb-8">
                            ${test.steps.map(s => `<li class="flex gap-3 text-slate-600 font-medium"><div class="mt-2 w-1.5 h-1.5 rounded-full bg-purple-400 shrink-0"></div>${s}</li>`).join('')}
                        </ul>
                        <div class="bg-purple-50 p-5 rounded-2xl border border-purple-100">
                            <p class="text-xs font-bold text-purple-400 uppercase mb-1">Expected</p>
                            <p class="text-purple-900 font-semibold text-sm">${test.expected}</p>
                        </div>
                    </div>
                    <div id="action-area" class="grid grid-cols-2 border-t border-slate-50">
                        <button onclick="showFailForm()" class="py-6 font-bold text-red-500 hover:bg-red-50 transition">FAIL</button>
                        <button onclick="submitResult('PASS')" class="py-6 font-bold text-white bg-gradient-to-r from-purple-600 to-indigo-600">PASS & NEXT</button>
                    </div>
                </div>`;
        }

        function showFailForm() {
            document.getElementById('action-area').outerHTML = `
                <div class="p-8 border-t border-slate-50 bg-slate-50 animate-in slide-in-from-bottom-2">
                    <textarea id="failSteps" placeholder="Steps to reproduce..." class="w-full p-4 rounded-xl border border-slate-200 mb-4 h-24 outline-none focus:ring-2 focus:ring-red-500"></textarea>
                    <input type="file" id="fileInput" class="hidden" onchange="uploadImage(this)">
                    <button onclick="document.getElementById('fileInput').click()" class="w-full p-3 mb-4 border-2 border-dashed border-slate-300 rounded-xl text-slate-500 text-sm font-medium hover:bg-white transition" id="upBtn">
                        Attach Screenshot
                    </button>
                    <div class="flex gap-3">
                        <button onclick="renderTest()" class="flex-1 font-bold text-slate-400">Cancel</button>
                        <button onclick="submitResult('FAIL')" class="flex-[2] py-3 bg-red-500 text-white rounded-xl font-bold">Submit Issue</button>
                    </div>
                </div>`;
        }

        // --- LOGIC ---
        async function uploadImage(input) {
            const file = input.files[0];
            const btn = document.getElementById('upBtn');
            btn.innerText = "Uploading...";
            
            const fileName = `${Date.now()}_${file.name}`;
            const { data, error } = await supabase.storage.from('test-screenshots').upload(fileName, file);
            
            if (!error) {
                const { data: { publicUrl } } = supabase.storage.from('test-screenshots').getPublicUrl(fileName);
                uploadedImageUrl = publicUrl;
                btn.innerText = "✅ Screenshot Attached";
                btn.classList.add('border-green-500', 'text-green-600');
            }
        }

        async function submitResult(status) {
            const steps = document.getElementById('failSteps')?.value || '';
            const { error } = await supabase.from('test_results').insert([{
                tester_name: testerInfo.name,
                device: testerInfo.device,
                platform: testerInfo.platform,
                test_id: TEST_SESSIONS[currentIndex].id,
                status: status,
                steps_to_reproduce: steps,
                image_url: uploadedImageUrl
            }]);

            if (error) { console.error(error); return; }

            uploadedImageUrl = null;
            if (currentIndex < TEST_SESSIONS.length - 1) {
                currentIndex++;
                renderTest();
            } else {
                renderFinished();
            }
        }

        function startTesting() {
            testerInfo.name = document.getElementById('tName').value;
            testerInfo.device = document.getElementById('tDevice').value;
            testerInfo.platform = document.getElementById('tPlatform').value;
            if (testerInfo.name) renderTest();
        }

        function renderFinished() {
            app.innerHTML = `
                <div class="text-center mt-20 py-10">
                    <div class="text-6xl mb-6">💜</div>
                    <h1 class="text-4xl font-bold mb-4">Thank You!</h1>
                    <p class="text-slate-500 mb-8">Your feedback is being reviewed by the team.</p>
                    <button onclick="location.reload()" class="text-purple-600 font-bold">Restart Test</button>
                </div>`;
        }

        // Initialize
        renderSetup();
    </script>
</body>
</html>
