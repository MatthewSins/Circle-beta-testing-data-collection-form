<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circle v3.1.1 | Master Test Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,1); }
        .gradient-text { background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen text-slate-900">

    <div id="app" class="max-w-xl mx-auto p-5 md:pt-12 pb-20">
        <div id="loader" class="flex flex-col items-center justify-center mt-40">
            <div class="w-10 h-10 border-4 border-purple-100 border-t-purple-600 rounded-full animate-spin mb-4"></div>
            <p class="text-slate-400 font-bold tracking-widest text-xs">LOADING MASTER SUITE...</p>
        </div>
    </div>

    <script>
        const SB_URL = ''https://shudgqztadlbhiifzlby.supabase.co; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNodWRncXp0YWRsYmhpaWZ6bGJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Mjg5ODgsImV4cCI6MjA5MDEwNDk4OH0.JytW6-XJ0p2mFcKAZKI0TKPL5TrbuYSYkhDz1DwlZzs';

        const { createClient } = supabase;
        const _supabase = createClient(SB_URL, SB_KEY);

        const TEST_SESSIONS = [
            // SECTION 1: CORE FLOW
            { id: "1.1", section: "Core Flow", title: "Sign In", steps: ["Open the app", "Sign in with Email, Google, or Apple"], expected: "Land on Home screen without errors" },
            { id: "1.2", section: "Core Flow", title: "Mood Check-in", steps: ["Tap mood check-in area on Home", "Select mood level + note/photo", "Save"], expected: "Celebration plays, aura updates, return Home" },
            { id: "1.3", section: "Core Flow", title: "Mood History", steps: ["Tap calendar/history icon", "Scroll through past entries"], expected: "Entries load correctly, no blank cards" },
            { id: "1.4", section: "Core Flow", title: "Circles Feed", steps: ["Tap Circles tab", "Open a circle", "Scroll feed"], expected: "Posts load, no spinning or errors" },
            { id: "1.5", section: "Core Flow", title: "Crisis Resources (Offline)", steps: ["Turn off Wi-Fi & Data", "Go to Help & Support"], expected: "NZ crisis numbers (1737, Lifeline) show without internet" },
            { id: "1.6", section: "Core Flow", title: "Account Settings", steps: ["Open Profile", "Tap Settings/Account"], expected: "Settings load, no crashes" },
            
            // SECTION 2: NEW FEATURES
            { id: "2.1", section: "New Features", title: "Day 7 Aura Unlock", steps: ["Check in for 7 consecutive/recent days"], expected: "Full-screen celebration + Share button (appears once)" },
            { id: "2.3", section: "New Features", title: "Low-Mood Response", steps: ["Log mood of 3 or lower"], expected: "Supportive overlay appears offering Breathing Exercise" },
            { id: "2.4", section: "New Features", title: "Monthly Summary", steps: ["Mood History -> Month Picker", "Tap 'View Summary'"], expected: "Summary card with avg mood and Share button appears" },
            { id: "2.5", section: "New Features", title: "Aura Sharing", steps: ["Profile/History -> Share Aura", "Tap Share"], expected: "Branded card generated + Native share sheet opens" },
            { id: "2.6", section: "New Features", title: "Circle Invite Link", steps: ["Open circle -> Invite Members", "Tap 'Share Link' tab", "Copy Link"], expected: "Link format: mycircle.co.nz/join/..." },
            { id: "2.7", section: "New Features", title: "Weekly Circle Digest", steps: ["Inside circle -> Look for 'This Week' stats"], expected: "Card showing check-ins and reactions for the week" },
            { id: "2.8", section: "New Features", title: "Easter Eggs", steps: ["Open Profile", "Scroll to 'Discoveries' section"], expected: "Grid of earned/hidden milestone cards" },
            { id: "2.9", section: "New Features", title: "Mood-Unlocked Content", steps: ["Log mood", "Check Breathing Exercise list"], expected: "Subtle notification if new content unlocks" },
            { id: "2.10", section: "New Features", title: "Reach Out (Peer Support)", steps: ["Home -> 'Reach out to your circle'", "Toggle anonymous, tap Send"], expected: "Confirmation modal; members notified" },
            { id: "2.11", section: "New Features", title: "Warmth Received", steps: ["Coordinate with another tester", "Open app after they 'Reach Out'"], expected: "Gradient overlay with response options appears" },

            // SECTION 3: PREMIUM
            { id: "3.1", section: "Premium", title: "Upgrade Screen Trigger", steps: ["Profile -> Settings -> Upgrade to Premium"], expected: "Full pricing/plan comparison screen appears" },
            { id: "3.2", section: "Premium", title: "Circle Limit Trigger", steps: ["Try to create a 4th circle"], expected: "Upgrade prompt appears before the form" },
            { id: "3.3", section: "Premium", title: "Pricing Load", steps: ["Check Monthly/Annual prices", "Verify 'Best Value' badge"], expected: "Prices load from RevenueCat (not blank)" },
            { id: "3.4", section: "Premium", title: "iOS Sandbox Purchase", steps: ["Subscribe using Sandbox Apple ID"], expected: "Transaction completes; account upgrades to Premium" },
            { id: "3.5", section: "Premium", title: "Android Test Purchase", steps: ["Subscribe using Google Test Billing"], expected: "Test transaction completes; Premium active" },
            { id: "3.6", section: "Premium", title: "Restore Purchases", steps: ["Tap 'Restore Purchases' on upgrade screen"], expected: "Success or 'No previous purchases' message" },

            // SECTION 4: EDGE CASES
            { id: "4.1", section: "Edge Cases", title: "Offline Mood Entry", steps: ["Turn off Data", "Log a mood"], expected: "Saves locally or shows clear connection error (No crash)" },
            { id: "4.2", section: "Edge Cases", title: "Leave Circle", steps: ["Circle Settings -> Leave Circle"], expected: "Confirmation prompt, then removed from list" }
        ];

        let currentIndex = 0;
        let testerInfo = { name: '', device: '', os: '', platform: 'iOS' };
        let uploadedImageUrl = null;
        const app = document.getElementById('app');

        function renderSetup() {
            app.innerHTML = `
                <div class="glass-card p-8 rounded-[2.5rem] shadow-2xl animate-in">
                    <h1 class="text-3xl font-extrabold gradient-text mb-1 italic tracking-tight">Circle v3.1.1</h1>
                    <p class="text-slate-500 mb-8 font-semibold">Master QA Environment</p>
                    
                    <div class="space-y-4 text-left">
                        <div>
                            <label class="text-[10px] font-extrabold text-slate-400 uppercase ml-1 tracking-widest">Tester Name</label>
                            <input id="tName" placeholder="Your Name" class="w-full mt-1 p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-purple-500 bg-white/50 shadow-sm transition">
                        </div>
                        <div>
                            <label class="text-[10px] font-extrabold text-slate-400 uppercase ml-1 tracking-widest">Device Model</label>
                            <input id="tDevice" placeholder="e.g. iPhone 13, Samsung S20" class="w-full mt-1 p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-purple-500 bg-white/50 shadow-sm">
                        </div>
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="text-[10px] font-extrabold text-slate-400 uppercase ml-1 tracking-widest">OS Version</label>
                                <input id="tOS" placeholder="e.g. iOS 18, Android 13" class="w-full mt-1 p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-purple-500 bg-white/50">
                            </div>
                            <div class="w-32">
                                <label class="text-[10px] font-extrabold text-slate-400 uppercase ml-1 tracking-widest">Platform</label>
                                <select id="tPlatform" class="w-full mt-1 p-4 rounded-2xl border border-slate-200 bg-white font-bold text-slate-700 outline-none">
                                    <option value="iOS">iOS</option><option value="Android">Android</option>
                                </select>
                            </div>
                        </div>
                        <button onclick="startTesting()" class="w-full py-5 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-2xl font-bold shadow-xl shadow-purple-100 transform active:scale-[0.98] transition mt-6 text-lg">Initialize Test</button>
                    </div>
                </div>`;
        }

        function renderTest() {
            const test = TEST_SESSIONS[currentIndex];
            app.innerHTML = `
                <div class="flex justify-between items-center mb-6 px-2">
                    <span class="px-4 py-1.5 bg-purple-100 text-purple-700 rounded-full text-[10px] font-extrabold uppercase tracking-widest">${test.section}</span>
                    <span class="text-xs text-slate-400 font-extrabold tracking-tighter italic">${currentIndex + 1} / ${TEST_SESSIONS.length}</span>
                </div>
                
                <div class="glass-card rounded-[2.5rem] shadow-xl overflow-hidden border border-white animate-in">
                    <div class="p-8">
                        <div class="flex items-start gap-4 mb-8">
                            <span class="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center font-bold text-lg shrink-0 shadow-lg shadow-slate-200">${test.id}</span>
                            <h2 class="text-2xl font-extrabold text-slate-800 leading-tight pt-1 tracking-tight">${test.title}</h2>
                        </div>
                        
                        <div class="space-y-4 mb-8">
                            <h3 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">Instructions</h3>
                            <ul class="space-y-3">
                                ${test.steps.map(s => `<li class="flex gap-3 text-slate-600 font-semibold text-sm leading-relaxed"><div class="mt-2 w-1.5 h-1.5 rounded-full bg-purple-500 shrink-0"></div>${s}</li>`).join('')}
                            </ul>
                        </div>

                        <div class="bg-indigo-50/50 p-6 rounded-3xl border border-indigo-100/50">
                            <p class="text-[10px] font-extrabold text-indigo-400 uppercase tracking-widest mb-1 text-center italic">Expected Outcome</p>
                            <p class="text-indigo-900 font-bold text-center leading-relaxed text-sm">${test.expected}</p>
                        </div>
                    </div>

                    <div id="action-area" class="grid grid-cols-2 border-t border-slate-100 bg-white/50">
                        <button onclick="showFailForm()" class="py-8 font-extrabold text-red-500 hover:bg-red-50 transition border-r border-slate-100 uppercase tracking-widest text-[11px]">Fail Test</button>
                        <button onclick="submitResult('PASS')" class="py-8 font-extrabold text-white bg-gradient-to-r from-purple-600 to-indigo-600 hover:opacity-90 uppercase tracking-widest text-[11px]">Pass & Next</button>
                    </div>
                </div>`;
        }

        function showFailForm() {
            document.getElementById('action-area').outerHTML = `
                <div class="p-8 border-t border-slate-100 bg-slate-50/50 animate-in">
                    <h3 class="font-extrabold text-slate-800 mb-4 text-sm uppercase tracking-widest">Report Issue</h3>
                    <textarea id="failSteps" placeholder="Describe the behavior..." class="w-full p-5 rounded-2xl border border-slate-200 mb-4 h-32 outline-none focus:ring-2 focus:ring-red-500 bg-white shadow-inner"></textarea>
                    
                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="uploadImage(this)">
                    <button id="upBtn" onclick="document.getElementById('fileInput').click()" class="w-full py-4 mb-6 border-2 border-dashed border-slate-300 rounded-2xl text-slate-400 text-[10px] font-extrabold uppercase hover:bg-white hover:border-purple-400 transition">
                        Attach Screenshot
                    </button>

                    <div class="flex gap-4">
                        <button onclick="renderTest()" class="flex-1 font-extrabold text-slate-400 uppercase text-[10px]">Cancel</button>
                        <button id="failSubmit" onclick="submitResult('FAIL')" class="flex-[2] py-4 bg-red-500 text-white rounded-2xl font-extrabold shadow-lg shadow-red-100 uppercase text-[10px] tracking-widest">Log Failure</button>
                    </div>
                </div>`;
        }

        async function uploadImage(input) {
            const file = input.files[0];
            if (!file) return;
            const btn = document.getElementById('upBtn');
            btn.innerText = "UPLOADING...";
            
            const fileName = `qa/${Date.now()}_${file.name}`;
            const { data, error } = await _supabase.storage.from('test-screenshots').upload(fileName, file);
            
            if (error) { alert(error.message); btn.innerText = "RETRY UPLOAD"; }
            else {
                const { data: { publicUrl } } = _supabase.storage.from('test-screenshots').getPublicUrl(fileName);
                uploadedImageUrl = publicUrl;
                btn.innerHTML = "✅ IMAGE ATTACHED";
                btn.classList.add('border-green-300', 'bg-green-50', 'text-green-600');
            }
        }

        async function submitResult(status) {
            const steps = document.getElementById('failSteps')?.value || '';
            const { error } = await _supabase.from('test_results').insert([{
                tester_name: testerInfo.name,
                device: testerInfo.device,
                os: testerInfo.os,
                platform: testerInfo.platform,
                test_id: TEST_SESSIONS[currentIndex].id,
                status: status,
                steps_to_reproduce: steps,
                image_url: uploadedImageUrl
            }]);

            if (error) { alert("Error: " + error.message); return; }

            uploadedImageUrl = null;
            if (currentIndex < TEST_SESSIONS.length - 1) {
                currentIndex++;
                renderTest();
                window.scrollTo({top: 0, behavior: 'smooth'});
            } else {
                renderFinished();
            }
        }

        function startTesting() {
            const n = document.getElementById('tName').value;
            const d = document.getElementById('tDevice').value;
            const o = document.getElementById('tOS').value;
            const p = document.getElementById('tPlatform').value;
            if (n && d && o) { testerInfo = { name: n, device: d, os: o, platform: p }; renderTest(); }
            else alert("Fill all fields!");
        }

        function renderFinished() {
            app.innerHTML = `
                <div class="text-center py-20 px-4 animate-in">
                    <div class="text-6xl mb-8">🏁</div>
                    <h1 class="text-4xl font-extrabold text-slate-900 mb-4 italic">Done!</h1>
                    <p class="text-slate-500 font-semibold max-w-xs mx-auto mb-10 text-sm">All 24 test cases have been recorded. Thank you for your support, Zobrist!</p>
                    <button onclick="location.reload()" class="px-10 py-4 bg-white border border-slate-200 text-slate-600 rounded-2xl font-extrabold shadow-sm uppercase text-[10px] tracking-widest">New Session</button>
                </div>`;
        }

        window.onload = () => { renderSetup(); };
    </script>
</body>
</html>
