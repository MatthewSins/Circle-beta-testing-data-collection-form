<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circle v3.1.1 | QA Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent;}
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,1); }
        .gradient-text { background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .progress-fill { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen text-slate-900">

    <div id="app" class="max-w-xl mx-auto p-4 md:pt-12 pb-24">
        <div id="loader" class="flex flex-col items-center justify-center mt-40">
            <div class="w-10 h-10 border-4 border-purple-100 border-t-purple-600 rounded-full animate-spin mb-4"></div>
            <p class="text-slate-400 font-bold tracking-widest text-xs uppercase">Initialising Master Suite...</p>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const SB_URL = 'https://shudgqztadlbhiifzlby.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNodWRncXp0YWRsYmhpaWZ6bGJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Mjg5ODgsImV4cCI6MjA5MDEwNDk4OH0.JytW6-XJ0p2mFcKAZKI0TKPL5TrbuYSYkhDz1DwlZzs';

        const { createClient } = supabase;
        const _supabase = createClient(SB_URL, SB_KEY);

        // FULL EXACT TEST CASES
        const TEST_SESSIONS = [
            { id: "1.1", section: "Core Flow", title: "Sign In", steps: [`Open the app`, `Sign in with your existing account (email or Google or Apple)`], expected: `You land on the Home screen without errors` },
            { id: "1.2", section: "Core Flow", title: "Mood Check-in", steps: [`Tap the mood check-in area on the Home screen`, `Select a mood level and optionally add a note or photo`, `Save it`], expected: `A gentle celebration animation plays, your aura updates, and you return to Home` },
            { id: "1.3", section: "Core Flow", title: "Mood History", steps: [`Tap the calendar/history icon on the Home screen`, `Scroll through your past mood entries`], expected: `All entries load correctly, no blank cards or errors` },
            { id: "1.4", section: "Core Flow", title: "Circles", steps: [`Tap the Circles tab`, `Open a circle you're already in`, `Scroll through the feed`], expected: `Posts load, no spinning or errors` },
            { id: "1.5", section: "Core Flow", title: "Crisis Resources", steps: [`Turn off Wi-Fi and mobile data`, `Maps to the crisis resources section (Help & Support or Settings)`], expected: `The page loads and shows NZ crisis numbers (1737, Lifeline) without needing internet` },
            { id: "1.6", section: "Core Flow", title: "Account Settings", steps: [`Open your Profile`, `Tap Settings or Account`], expected: `Settings load, no crashes` },
            { id: "2.1", section: "New Features", title: "Day 7 Aura Unlock", steps: [`Check in for 7 consecutive (or recent) days`], expected: `A full-screen celebration appears with your aura gradient and a Share button. It should only appear once (not every time you check in after day 7).` },
            { id: "2.3", section: "New Features", title: "Low-Mood Response", steps: [`Log a mood of 3 or lower`, `Tap through to the Breathing Exercise`], expected: `After saving, a warm overlay appears offering the Breathing Exercise or your circle feed. It should feel supportive, not alarming. 60-second breathing exercise launches correctly.` },
            { id: "2.4", section: "New Features", title: "Monthly Summary", steps: [`Tap into Mood History`, `At the bottom, look for a month picker and "View Summary" button`, `Tap View Summary for any completed month`], expected: `A summary card appears showing average mood, top emotions, and a month headline. A Share button should be present.` },
            { id: "2.5", section: "New Features", title: "Aura Sharing", steps: [`Open your Profile or Mood History`, `Find the Share Aura option`, `Tap it`], expected: `A branded aura card is generated and the native share sheet appears. You can share or cancel — no requirement to actually post anywhere.` },
            { id: "2.6", section: "New Features", title: "Circle Invite Link", steps: [`Open a circle you own or are a member of`, `Tap Invite Members (or the invite icon)`, `Look for a "Share Link" tab alongside the email invite tab`, `Tap Copy Link or Share`], expected: `A unique link is copied or the native share sheet opens. The link should look like mycircle.co.nz/join/...` },
            { id: "2.7", section: "New Features", title: "Weekly Circle Digest", steps: [`Open a circle with at least 2 active members`, `Look for a "This Week" or digest option in the circle`], expected: `A card showing circle stats for the past week (how many check-ins, reactions shared). A Share button should be present.` },
            { id: "2.8", section: "New Features", title: "Easter Egg Discoveries", steps: [`Open your Profile`, `Scroll down past your Aura`, `Look for a "Discoveries" section`], expected: `A grid of cards, some blank (hidden until earned), any earned ones showing a name and date.` },
            { id: "2.9", section: "New Features", title: "Mood-Unlocked Content", steps: [`Log a mood (any level)`, `Check the Breathing Exercise list for any newly unlocked variants`], expected: `If your mood history matches an unlock rule, a subtle notification appears: "You've unlocked something new." This is intentionally rare and not always visible.` },
            { id: "2.10", section: "New Features", title: "Reach Out to Your Circle", steps: [`Scroll down past your circles section on Home screen`, `Look for a card with a purple heart icon labelled "Reach out to your circle" and tap it`, `Toggle anonymous on or off, then tap Send`, `From inside a circle: Scroll down to find the secondary support button below the main post button and tap it`], expected: `Confirmation — "Your circle has been notified. They're here for you." Members receive a push notification. Inside circle modal should pre-select that circle.` },
            { id: "2.11", section: "New Features", title: "Warmth Received Event", steps: [`Coordinate with another tester who is in the same circle`, `Have them tap "Reach out to your circle"`, `Open the app on your device`], expected: `A gradient overlay showing who reached out (or "A circle member" if anonymous) with warmth response options. Dismiss by tapping the button.` },
            { id: "3.1", section: "Premium Flow", title: "Trigger Upgrade Screen", steps: [`Open Profile → Settings → tap "Upgrade to Premium"`], expected: `Full-screen premium upgrade screen with pricing, plan comparison, and monthly/annual options` },
            { id: "3.2", section: "Premium Flow", title: "Trigger via Circle Limit", steps: [`Create 3 circles (or already have 3)`, `Try to create a 4th`], expected: `Upgrade prompt appears before the create form` },
            { id: "3.3", section: "Premium Flow", title: "View Pricing", steps: [`On the upgrade screen, note both the monthly and annual plan prices`, `Confirm the annual plan has a "Best Value" badge and is pre-selected`], expected: `Prices load from RevenueCat (may take 1-2 seconds). Report if they show as blank or fail to load.` },
            { id: "3.4", section: "Premium Flow", title: "Tap Subscribe (iOS)", steps: [`Select a plan and tap the Subscribe / Start Free Trial button`, `When the Apple payment sheet appears, sign in with your assigned sandbox Apple ID`], expected: `Apple payment sheet appears, processes the sandbox transaction, and returns you to the app with your account upgraded to Premium.` },
            { id: "3.5", section: "Premium Flow", title: "Tap Subscribe (Android)", steps: [`Select a plan and tap Subscribe`], expected: `Google Play billing sheet appears. The purchase will be processed as a test transaction (no real charge). Report the outcome.` },
            { id: "3.6", section: "Premium Flow", title: "Restore Purchases", steps: [`On the upgrade screen or subscription settings, tap "Restore Purchases"`], expected: `A message saying either "Purchases Restored" or "No previous purchases found for this account"` },
            { id: "3.7", section: "Premium Flow", title: "Dismiss Screen", steps: [`On the upgrade screen, tap the X or back button`], expected: `Returns to the previous screen cleanly with no errors` },
            { id: "4.1", section: "Edge Cases", title: "Offline Mood Entry", steps: [`Turn off Wi-Fi and mobile data`, `Try to log a mood`], expected: `Either it saves locally and syncs when back online, OR a clear message explains it needs a connection. It should NOT crash silently.` },
            { id: "4.2", section: "Edge Cases", title: "Create a New Circle", steps: [`Tap Circles → Create Circle`, `Fill in a name, colour, and icon`, `Save`], expected: `Circle is created and you land in it.` },
            { id: "4.3", section: "Edge Cases", title: "Email Invite", steps: [`Inside a circle → Invite Members → Email tab`, `Enter an email address and send`], expected: `Confirmation that the invite was sent. No errors.` },
            { id: "4.4", section: "Edge Cases", title: "Leave a Circle", steps: [`Open a circle you're a member of (not the owner)`, `Find the Leave option in settings/menu`], expected: `Confirmation prompt, then you're removed from the circle.` },
            { id: "4.5", section: "Edge Cases", title: "Quick Reflect", steps: [`On the Home screen or Reflections tab, tap Quick Reflect`, `Take or choose a photo, optionally add a note`, `Save`], expected: `Reflection saved, visible in your history.` },
            { id: "4.6", section: "Edge Cases", title: "Notifications", steps: [`Check that notifications are enabled for Circle in your phone settings`, `Have another tester post something in a shared circle`], expected: `You receive a push notification within a reasonable time.` }
        ];

        let currentIndex = 0;
        let testerInfo = { name: '', device: '', os: '', platform: 'iOS' };
        let uploadedImageUrl = null;
        const app = document.getElementById('app');

                function renderSetup() {
            app.innerHTML = `
                <div class="glass-card p-6 md:p-8 rounded-[2rem] shadow-2xl animate-in text-center overflow-hidden">
                    <h1 class="text-3xl font-extrabold gradient-text mb-6 tracking-tight">Circle v3.1.1</h1>
                    <div class="space-y-4 text-left w-full">
                        <input id="tName" placeholder="Tester Name" class="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-purple-500 shadow-sm font-medium">
                        <input id="tDevice" placeholder="Device (e.g. Samsung S20)" class="w-full p-4 rounded-2xl border border-slate-200 outline-none shadow-sm font-medium">
                        <div class="flex gap-3 w-full">
                            <input id="tOS" placeholder="OS (e.g. Android 13)" class="w-2/3 min-w-0 p-4 rounded-2xl border border-slate-200 outline-none shadow-sm font-medium">
                            <select id="tPlatform" class="w-1/3 min-w-0 p-4 rounded-2xl border border-slate-200 bg-white font-bold text-slate-700 outline-none">
                                <option>iOS</option><option>Android</option>
                            </select>
                        </div>
                        <button onclick="startTesting()" class="w-full py-5 bg-purple-600 text-white rounded-2xl font-bold shadow-lg mt-6 transform active:scale-95 transition">Start Final Test</button>
                    </div>
                </div>`;
        }

        function renderTest() {
            const test = TEST_SESSIONS[currentIndex];
            const progress = ((currentIndex + 1) / TEST_SESSIONS.length) * 100;

            app.innerHTML = `
                <div class="flex justify-between items-center mb-4 px-1">
                    <span class="px-4 py-1.5 bg-purple-100 text-purple-800 rounded-full text-[10px] font-extrabold uppercase tracking-widest">${test.section}</span>
                    <div class="flex gap-2">
                        <button onclick="nav(-1)" class="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm text-slate-400 disabled:opacity-30 active:bg-slate-50" ${currentIndex === 0 ? 'disabled' : ''}>←</button>
                        <button onclick="nav(1)" class="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm text-slate-400 disabled:opacity-30 active:bg-slate-50" ${currentIndex === TEST_SESSIONS.length - 1 ? 'disabled' : ''}>→</button>
                    </div>
                </div>

                <div class="w-full bg-slate-200 h-2 rounded-full mb-6 overflow-hidden">
                    <div class="progress-fill h-full bg-purple-600 rounded-full" style="width: ${progress}%"></div>
                </div>
                
                <div class="glass-card rounded-[2rem] shadow-xl overflow-hidden border border-white animate-in flex flex-col">
                    <div class="p-6 md:p-8 custom-scrollbar overflow-y-auto max-h-[60vh]">
                        <h2 class="text-xl md:text-2xl font-extrabold text-slate-800 mb-6 tracking-tight flex items-start gap-3">
                            <span class="text-purple-500 text-sm md:text-base opacity-70 font-mono mt-1 shrink-0">${test.id}</span> 
                            <span>${test.title}</span>
                        </h2>
                        
                        <div class="mb-8">
                            <h3 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest mb-3">Exact Steps</h3>
                            <ul class="space-y-4">
                                ${test.steps.map(s => `<li class="flex gap-3 text-slate-700 font-medium text-sm md:text-base leading-relaxed"><div class="mt-2 w-1.5 h-1.5 rounded-full bg-purple-500 shrink-0"></div>${s}</li>`).join('')}
                            </ul>
                        </div>

                        <div class="bg-indigo-50/70 p-5 md:p-6 rounded-2xl border border-indigo-100">
                            <p class="text-[10px] font-extrabold text-indigo-500 uppercase tracking-widest mb-2">Expected Outcome</p>
                            <p class="text-indigo-900 font-bold text-sm md:text-base leading-relaxed">${test.expected}</p>
                        </div>
                    </div>

                    <div id="action-area" class="grid grid-cols-2 border-t border-slate-100 bg-white mt-auto shrink-0">
                        <button onclick="showFailForm()" class="py-6 md:py-8 font-extrabold text-red-500 hover:bg-red-50 transition border-r border-slate-100 uppercase text-xs tracking-widest">Fail Test</button>
                        <button onclick="submitResult('PASS')" class="py-6 md:py-8 font-extrabold text-white bg-gradient-to-r from-purple-600 to-indigo-600 hover:opacity-90 transition uppercase text-xs tracking-widest">Pass & Next</button>
                    </div>
                </div>
                <p class="text-center mt-6 text-[10px] font-bold text-slate-400 tracking-widest uppercase italic">Progress: ${currentIndex + 1} of ${TEST_SESSIONS.length}</p>`;
        }

        function showFailForm() {
            document.getElementById('action-area').outerHTML = `
                <div class="p-6 md:p-8 border-t border-slate-100 bg-slate-50/80 animate-in mt-auto shrink-0">
                    <textarea id="failSteps" placeholder="What broke? Detail the exact steps you took..." class="w-full p-4 rounded-xl border border-slate-200 mb-4 h-28 md:h-32 outline-none focus:ring-2 focus:ring-red-500 bg-white font-medium text-sm resize-none"></textarea>
                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="uploadImage(this)">
                    <button id="upBtn" onclick="document.getElementById('fileInput').click()" class="w-full py-4 mb-4 border-2 border-dashed border-slate-300 rounded-xl text-slate-500 text-xs font-bold uppercase hover:bg-white hover:border-purple-400 transition">Attach Screenshot Proof</button>
                    <div class="flex gap-3 md:gap-4">
                        <button onclick="renderTest()" class="flex-1 font-bold text-slate-400 uppercase text-[10px] hover:bg-white rounded-xl transition">Cancel</button>
                        <button onclick="submitResult('FAIL')" class="flex-[2] py-4 bg-red-500 text-white rounded-xl font-bold uppercase text-[10px] md:text-xs tracking-widest shadow-lg shadow-red-200 active:scale-95 transition">Log Bug to Database</button>
                    </div>
                </div>`;
        }

        async function uploadImage(input) {
            const file = input.files[0];
            if (!file) return;
            const btn = document.getElementById('upBtn');
            btn.innerText = "UPLOADING...";
            const fileName = `qa/${Date.now()}_${file.name}`;
            const { data, error } = await _supabase.storage.from('test-screenshots').upload(fileName, file);
            if (error) { alert(error.message); btn.innerText = "UPLOAD FAILED - RETRY"; }
            else {
                const { data: { publicUrl } } = _supabase.storage.from('test-screenshots').getPublicUrl(fileName);
                uploadedImageUrl = publicUrl;
                btn.innerHTML = "✅ SCREENSHOT ATTACHED";
                btn.classList.add('border-green-400', 'bg-green-50', 'text-green-700');
            }
        }

        async function submitResult(status) {
            const btn = event.currentTarget;
            btn.innerText = "SAVING...";
            btn.disabled = true;

            const steps = document.getElementById('failSteps')?.value || '';
            const { error } = await _supabase.from('test_results').insert([{
                tester_name: testerInfo.name, device: testerInfo.device, os: testerInfo.os, platform: testerInfo.platform,
                test_id: TEST_SESSIONS[currentIndex].id, status: status, steps_to_reproduce: steps, image_url: uploadedImageUrl
            }]);
            
            if (error) { 
                alert("Database Error: " + error.message); 
                btn.innerText = status === 'PASS' ? "PASS & NEXT" : "LOG BUG TO DATABASE"; 
                btn.disabled = false;
                return; 
            }
            
            uploadedImageUrl = null;
            if (currentIndex < TEST_SESSIONS.length - 1) { 
                currentIndex++; 
                renderTest(); 
                window.scrollTo({top: 0, behavior: 'smooth'}); 
            } else { 
                renderFinished(); 
            }
        }

        function nav(dir) { currentIndex += dir; renderTest(); window.scrollTo({top: 0, behavior: 'smooth'}); }

        function startTesting() {
            const n = document.getElementById('tName').value;
            const d = document.getElementById('tDevice').value;
            const o = document.getElementById('tOS').value;
            const p = document.getElementById('tPlatform').value;
            if (n && d && o) { testerInfo = { name: n, device: d, os: o, platform: p }; renderTest(); }
            else alert("Please fill in Name, Device, and OS to ensure data quality.");
        }

        function renderFinished() {
            app.innerHTML = `
                <div class="text-center py-20 animate-in">
                    <div class="text-6xl mb-6 text-green-500">✅</div>
                    <h1 class="text-3xl md:text-4xl font-extrabold mb-4 tracking-tight">Session Complete</h1>
                    <p class="text-slate-500 mb-10 font-medium text-sm md:text-base max-w-sm mx-auto">All ${TEST_SESSIONS.length} results have been permanently logged. The client can now view them on the dashboard.</p>
                    <button onclick="location.reload()" class="px-8 py-4 bg-white border border-slate-200 text-purple-600 rounded-xl font-extrabold uppercase text-xs tracking-widest shadow-sm hover:bg-slate-50 active:scale-95 transition">Start New Session</button>
                </div>`;
        }

        window.onload = () => { renderSetup(); };
    </script>
</body>
</html>
